repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-ll", "-ii"]
        additional_dependencies: ["bandit[toml]"]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'pnpm-lock.yaml|uv.lock'

  - repo: local
    hooks:
      - id: clean-secrets-baseline
        name: Clean Secrets Baseline Line Numbers
        entry: python3 scripts/clean_secrets_baseline.py
        language: system
        files: \.secrets\.baseline$
        pass_filenames: false

      - id: generate-adr-index
        name: Generate ADR Index Log
        entry: python3 scripts/generate_adr_index.py
        language: system
        files: ^docs/adr/
        pass_filenames: false

      - id: generate-rtm
        name: Generate SDLC Requirements Traceability Matrix and Reports
        entry: python3 scripts/generate_rtm.py
        language: system
        files: ^(apps/|tests/|docs/SRS\.md|docs/SDLC/01_Product_Requirements_Document_PRD\.md)
        pass_filenames: false

      - id: check-markdown-links
        name: Check Markdown Links
        entry: node scripts/check-links.js
        language: system
        files: \.md$
        pass_filenames: false
